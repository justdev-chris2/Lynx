name: Build Lynx Engine

on: [push]

jobs:
  build-engine:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Compile Engine
      run: gcc main.c scanner.c parser.c memory.c libloader.c -o lynx.exe -lurlmon

    - name: Build Installer
      run: |
        cd installer
        & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" Lynx.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: NekoBeats-2.3-installer
        path: D:\a\Lynx\Lynx\installer\installer\Lynx-1.3.3-installer.exe

    - name: Upload Engine Artifact
      uses: actions/upload-artifact@v4
      with:
        name: lynx-engine
        path: lynx.exe
